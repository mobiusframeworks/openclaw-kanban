<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Timeline Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Task Backlog */
        .sidebar {
            width: 320px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
        }
        .sidebar-header h2 { font-size: 16px; margin-bottom: 12px; }

        /* Eisenhower Matrix Tabs */
        .matrix-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }
        .matrix-tab {
            flex: 1;
            padding: 8px 4px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }
        .matrix-tab.q1 { background: #da3633; color: #fff; }
        .matrix-tab.q2 { background: #f0883e; color: #fff; }
        .matrix-tab.q3 { background: #3fb950; color: #fff; }
        .matrix-tab.q4 { background: #8b949e; color: #fff; }
        .matrix-tab.active { outline: 2px solid #58a6ff; outline-offset: 2px; }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .task-item {
            background: #21262d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: grab;
            border-left: 4px solid #30363d;
            transition: all 0.15s;
        }
        .task-item:hover { background: #30363d; }
        .task-item.dragging { opacity: 0.5; }
        .task-item .agent-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .task-item.bml { border-left-color: #f7931a; }
        .task-item.bml .agent-badge { background: #f7931a; color: #000; }
        .task-item.ene { border-left-color: #3fb950; }
        .task-item.ene .agent-badge { background: #3fb950; color: #000; }
        .task-item.rea { border-left-color: #58a6ff; }
        .task-item.rea .agent-badge { background: #58a6ff; color: #000; }
        .task-item.ana { border-left-color: #a371f7; }
        .task-item.ana .agent-badge { background: #a371f7; color: #000; }
        .task-item.ass { border-left-color: #f78166; }
        .task-item.ass .agent-badge { background: #f78166; color: #000; }

        .task-item .priority-badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
        }
        .priority-badge.q1 { background: #da3633; }
        .priority-badge.q2 { background: #f0883e; }
        .priority-badge.q3 { background: #3fb950; }
        .priority-badge.q4 { background: #8b949e; }

        .task-item .text {
            font-size: 13px;
            line-height: 1.4;
        }
        .task-item .duration {
            font-size: 11px;
            color: #8b949e;
            margin-top: 6px;
        }

        /* Main Timeline Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .main-header {
            padding: 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .main-header h1 { font-size: 20px; }
        .controls button {
            background: #238636;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }
        .controls button:hover { background: #2ea043; }
        .controls button.secondary { background: #30363d; }

        /* Timeline */
        .timeline-wrapper {
            flex: 1;
            overflow: auto;
            padding: 16px;
        }
        .timeline {
            min-width: 1200px;
        }

        /* Time header */
        .time-header {
            display: flex;
            margin-left: 140px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 8px;
            margin-bottom: 8px;
        }
        .time-slot-header {
            width: 120px;
            text-align: center;
            font-size: 12px;
            color: #8b949e;
            flex-shrink: 0;
        }
        .time-slot-header.now { color: #3fb950; font-weight: bold; }

        /* Swimlanes */
        .swimlane {
            display: flex;
            margin-bottom: 4px;
            min-height: 80px;
        }
        .swimlane-label {
            width: 140px;
            padding: 12px;
            background: #161b22;
            border-radius: 8px 0 0 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .swimlane-label .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .swimlane.bml .dot { background: #f7931a; }
        .swimlane.ene .dot { background: #3fb950; }
        .swimlane.rea .dot { background: #58a6ff; }
        .swimlane.ana .dot { background: #a371f7; }
        .swimlane.ass .dot { background: #f78166; }

        .swimlane-track {
            flex: 1;
            display: flex;
            background: #161b22;
            border-radius: 0 8px 8px 0;
        }
        .time-slot {
            width: 120px;
            min-height: 70px;
            border-left: 1px dashed #30363d;
            padding: 6px;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .time-slot:first-child { border-left: none; }
        .time-slot.drag-over {
            background: rgba(56, 139, 253, 0.15);
        }
        .time-slot.now {
            background: rgba(63, 185, 80, 0.1);
            border-left: 2px solid #3fb950;
        }

        /* Scheduled task in timeline */
        .scheduled-task {
            background: #21262d;
            border-radius: 6px;
            padding: 8px;
            font-size: 12px;
            cursor: grab;
            border-left: 3px solid #30363d;
            margin-bottom: 4px;
        }
        .scheduled-task.q1 { border-left-color: #da3633; }
        .scheduled-task.q2 { border-left-color: #f0883e; }
        .scheduled-task.q3 { border-left-color: #3fb950; }
        .scheduled-task.q4 { border-left-color: #8b949e; }
        .scheduled-task .text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Legend */
        .legend {
            padding: 12px 16px;
            border-top: 1px solid #30363d;
            font-size: 11px;
            color: #8b949e;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; height: 40vh; }
            .timeline-wrapper { padding: 8px; }
            .swimlane-label { width: 80px; font-size: 11px; }
            .time-slot { width: 80px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar: Task Backlog -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Task Backlog</h2>
                <div class="matrix-tabs">
                    <button class="matrix-tab q1 active" onclick="filterTasks('q1')" title="Urgent + Important">Q1</button>
                    <button class="matrix-tab q2" onclick="filterTasks('q2')" title="Important, Not Urgent">Q2</button>
                    <button class="matrix-tab q3" onclick="filterTasks('q3')" title="Urgent, Not Important">Q3</button>
                    <button class="matrix-tab q4" onclick="filterTasks('q4')" title="Neither">Q4</button>
                </div>
                <div style="font-size:11px;color:#8b949e;">
                    Q1: Do First | Q2: Schedule | Q3: Delegate | Q4: Eliminate
                </div>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>

        <!-- Main Timeline -->
        <div class="main">
            <div class="main-header">
                <h1>Execution Timeline</h1>
                <div class="controls">
                    <button class="secondary" onclick="loadFromGitHub()">Sync GitHub</button>
                    <button class="secondary" onclick="clearSchedule()">Clear</button>
                    <button onclick="exportSchedule()">Export</button>
                </div>
            </div>

            <div class="timeline-wrapper">
                <div class="timeline">
                    <div class="time-header" id="timeHeader"></div>
                    <div id="swimlanes"></div>
                </div>
            </div>

            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:#da3633"></div> Q1: Urgent + Important</div>
                <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div> Q2: Important (Schedule)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div> Q3: Urgent (Delegate)</div>
                <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div> Q4: Low Priority</div>
            </div>
        </div>
    </div>

    <script>
        const AGENTS = [
            { id: 'bml', name: 'BML CEO', color: '#f7931a' },
            { id: 'ene', name: 'EnergyScout', color: '#3fb950' },
            { id: 'rea', name: 'Real Estate', color: '#58a6ff' },
            { id: 'ana', name: 'Analytics', color: '#a371f7' },
            { id: 'ass', name: 'Assistant', color: '#f78166' }
        ];

        const TIME_SLOTS = ['Now', '+1h', '+2h', '+3h', '+4h', 'Tomorrow AM', 'Tomorrow PM', 'This Week', 'Next Week', 'Backlog'];

        let tasks = JSON.parse(localStorage.getItem('timeline-tasks') || '[]');
        let schedule = JSON.parse(localStorage.getItem('timeline-schedule') || '{}');
        let currentFilter = 'q1';

        function init() {
            renderTimeHeader();
            renderSwimlanes();
            renderTasks();
            renderSchedule();
        }

        function renderTimeHeader() {
            const header = document.getElementById('timeHeader');
            header.innerHTML = TIME_SLOTS.map((slot, i) =>
                `<div class="time-slot-header ${i === 0 ? 'now' : ''}">${slot}</div>`
            ).join('');
        }

        function renderSwimlanes() {
            const container = document.getElementById('swimlanes');
            container.innerHTML = AGENTS.map(agent => `
                <div class="swimlane ${agent.id}">
                    <div class="swimlane-label">
                        <div class="dot"></div>
                        <span>${agent.name}</span>
                    </div>
                    <div class="swimlane-track">
                        ${TIME_SLOTS.map((slot, i) => `
                            <div class="time-slot ${i === 0 ? 'now' : ''}"
                                 data-agent="${agent.id}"
                                 data-slot="${i}"
                                 ondragover="handleDragOver(event)"
                                 ondragleave="handleDragLeave(event)"
                                 ondrop="handleDrop(event)">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            const filtered = tasks.filter(t => t.quadrant === currentFilter && !t.scheduled);

            list.innerHTML = filtered.map(task => `
                <div class="task-item ${task.agent}"
                     draggable="true"
                     data-id="${task.id}"
                     ondragstart="handleDragStart(event)">
                    <span class="agent-badge">${task.agent.toUpperCase()}</span>
                    <span class="priority-badge ${task.quadrant}">Q${task.quadrant.charAt(1)}</span>
                    <div class="text">${task.text}</div>
                    <div class="duration">~${task.duration || 30}min</div>
                </div>
            `).join('') || '<div style="color:#8b949e;text-align:center;padding:20px;">No tasks in this quadrant</div>';

            // Update tab counts
            document.querySelectorAll('.matrix-tab').forEach(tab => {
                const q = tab.classList[1];
                const count = tasks.filter(t => t.quadrant === q && !t.scheduled).length;
                tab.textContent = `Q${q.charAt(1)} (${count})`;
            });
        }

        function renderSchedule() {
            // Clear all slots first
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.innerHTML = '';
            });

            // Render scheduled tasks
            Object.entries(schedule).forEach(([key, taskIds]) => {
                const [agent, slotIndex] = key.split('-');
                const slot = document.querySelector(`.time-slot[data-agent="${agent}"][data-slot="${slotIndex}"]`);
                if (!slot) return;

                taskIds.forEach(taskId => {
                    const task = tasks.find(t => t.id === taskId);
                    if (!task) return;
                    slot.innerHTML += `
                        <div class="scheduled-task ${task.quadrant}"
                             draggable="true"
                             data-id="${task.id}"
                             ondragstart="handleDragStart(event)">
                            <div class="text">${task.text}</div>
                        </div>
                    `;
                });
            });
        }

        function filterTasks(quadrant) {
            currentFilter = quadrant;
            document.querySelectorAll('.matrix-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.matrix-tab.${quadrant}`).classList.add('active');
            renderTasks();
        }

        let draggedTaskId = null;

        function handleDragStart(e) {
            draggedTaskId = e.target.dataset.id;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');

            const agent = e.currentTarget.dataset.agent;
            const slot = e.currentTarget.dataset.slot;
            const key = `${agent}-${slot}`;

            if (!draggedTaskId) return;

            const task = tasks.find(t => t.id === draggedTaskId);
            if (!task) return;

            // Remove from old location
            Object.keys(schedule).forEach(k => {
                schedule[k] = schedule[k].filter(id => id !== draggedTaskId);
                if (schedule[k].length === 0) delete schedule[k];
            });

            // Add to new location
            if (!schedule[key]) schedule[key] = [];
            schedule[key].push(draggedTaskId);

            // Mark as scheduled
            task.scheduled = true;
            task.scheduledAgent = agent;
            task.scheduledSlot = parseInt(slot);

            save();
            renderTasks();
            renderSchedule();
            draggedTaskId = null;
        }

        function save() {
            localStorage.setItem('timeline-tasks', JSON.stringify(tasks));
            localStorage.setItem('timeline-schedule', JSON.stringify(schedule));
        }

        async function loadFromGitHub() {
            const GITHUB_BASE = 'https://raw.githubusercontent.com/mobiusframeworks/openclaw-kanban/main/backlogs';
            const agentFiles = {
                'bml': 'bml-ceo.md',
                'ene': 'energyscout-ceo.md',
                'rea': 'realestate-ceo.md',
                'ana': 'analytics.md',
                'ass': 'assistant.md'
            };

            tasks = [];
            schedule = {};

            for (const [agent, file] of Object.entries(agentFiles)) {
                try {
                    const resp = await fetch(`${GITHUB_BASE}/${file}`);
                    if (!resp.ok) continue;
                    const content = await resp.text();

                    content.split('\n').forEach(line => {
                        let text = null;
                        if (line.startsWith('### ')) {
                            text = line.replace('###', '').replace(/^\d+\.\s*/, '').trim();
                        } else if (line.trim().startsWith('- [ ]')) {
                            text = line.replace('- [ ]', '').trim();
                        }

                        if (text) {
                            // Auto-assign quadrant based on keywords
                            let quadrant = 'q2'; // Default: important but not urgent
                            const lower = text.toLowerCase();
                            if (lower.includes('urgent') || lower.includes('asap') || lower.includes('critical')) {
                                quadrant = 'q1';
                            } else if (lower.includes('research') || lower.includes('plan') || lower.includes('review')) {
                                quadrant = 'q2';
                            } else if (lower.includes('email') || lower.includes('respond') || lower.includes('call')) {
                                quadrant = 'q3';
                            } else if (lower.includes('maybe') || lower.includes('optional') || lower.includes('consider')) {
                                quadrant = 'q4';
                            }

                            tasks.push({
                                id: 'task-' + Date.now() + Math.random(),
                                text: text.substring(0, 60),
                                agent: agent,
                                quadrant: quadrant,
                                duration: 30,
                                scheduled: false
                            });
                        }
                    });
                } catch (e) { console.error(e); }
            }

            save();
            renderTasks();
            renderSchedule();
            alert(`Loaded ${tasks.length} tasks`);
        }

        function clearSchedule() {
            if (!confirm('Clear all scheduled tasks?')) return;
            schedule = {};
            tasks.forEach(t => {
                t.scheduled = false;
                delete t.scheduledAgent;
                delete t.scheduledSlot;
            });
            save();
            renderTasks();
            renderSchedule();
        }

        function exportSchedule() {
            const output = AGENTS.map(agent => {
                const agentSchedule = TIME_SLOTS.map((slot, i) => {
                    const key = `${agent.id}-${i}`;
                    const taskIds = schedule[key] || [];
                    const taskTexts = taskIds.map(id => tasks.find(t => t.id === id)?.text).filter(Boolean);
                    return taskTexts.length ? `  ${slot}: ${taskTexts.join(', ')}` : null;
                }).filter(Boolean).join('\n');

                return agentSchedule ? `${agent.name}:\n${agentSchedule}` : null;
            }).filter(Boolean).join('\n\n');

            const blob = new Blob([output || 'No tasks scheduled'], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'execution-schedule.txt';
            a.click();
        }

        init();
    </script>
</body>
</html>
